# Render Blueprint for the Grind API (Express + Prisma).
# Backend deploy: dashboard → Vercel, screenshots → Cloudinary, DB → Neon.
#
# This is a pnpm + Turborepo monorepo. Render builds from the repo root; the
# API artifact is a self-contained CJS bundle (workspace packages inlined by
# tsup) run with `node dist/index.cjs`.
#
# Secrets marked `sync: false` are NOT stored in git — set them in the Render
# dashboard (or when importing this blueprint). See README / DEPLOY notes.
services:
  - type: web
    name: grind-api
    runtime: node
    plan: starter # free tier sleeps + has no preDeploy; starter keeps it warm
    region: oregon
    rootDir: .
    # Upgrade corepack first: the one bundled with Node 20.18.0 has stale npm
    # registry signing keys and dies with "Cannot find matching keyid" when it
    # provisions pnpm. corepack@latest ships current keys; it then pins
    # pnpm@9.12.0 from package.json "packageManager".
    #
    # Install ONLY the api + db dependency closure (`--filter ...`): the API
    # server has no business compiling the Electron agent's native modules
    # (sharp/better-sqlite3/uiohook), which is both wasteful and fails on
    # Render (sharp tries to build against the system libvips with an old
    # toolchain). `NODE_ENV=development` on the install forces devDependencies
    # (tsup + the prisma CLI) to install even though the service runs with
    # NODE_ENV=production at runtime.
    # Then: prisma generate → build → migrate the Neon DB on every deploy.
    buildCommand: >-
      npm i -g corepack@latest &&
      corepack enable &&
      NODE_ENV=development pnpm install --frozen-lockfile --filter @grind/api... --filter @grind/db... &&
      pnpm --filter @grind/db exec prisma generate &&
      pnpm --filter @grind/api build &&
      pnpm --filter @grind/db exec prisma migrate deploy
    startCommand: pnpm --filter @grind/api start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.18.0"
      # Keep corepack from auto-fetching "latest" (avoids the signing-key path).
      - key: COREPACK_DEFAULT_TO_LATEST
        value: "0"
      # The agent's `sharp` gets pulled into the workspace install. Render has a
      # system libvips, so sharp tries to compile against it and fails on the
      # old toolchain. Force sharp to use its prebuilt binary instead.
      - key: SHARP_IGNORE_GLOBAL_LIBVIPS
        value: "1"
      # Neon pooled URL (runtime). Set in dashboard.
      - key: DATABASE_URL
        sync: false
      # Neon direct URL (used by `prisma migrate deploy`). Set in dashboard.
      - key: DIRECT_URL
        sync: false
      # Render generates a strong value on first deploy; rotating it logs
      # everyone out. 32+ chars satisfies the env schema.
      - key: JWT_SECRET
        generateValue: true
      # Comma-separated dashboard origin(s) for CORS + cross-site cookies,
      # e.g. https://grind-dashboard.vercel.app
      - key: DASHBOARD_URL
        sync: false
      # --- Cloudinary (screenshot storage) ---
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: grind/screenshots
      # --- Lark / Feishu (optional; leave unset to disable) ---
      - key: LARK_APP_ID
        sync: false
      - key: LARK_APP_SECRET
        sync: false
      - key: LARK_TOKEN_KEY
        sync: false
      - key: LARK_OAUTH_REDIRECT_URI
        sync: false
