services:
  api:
    build:
      context: ../..
      dockerfile: infra/vps/Dockerfile.api
    env_file:
      - ./.env.production
    environment:
      NODE_ENV: production
      API_PORT: 4000
    ports:
      - "127.0.0.1:4100:4000"
    restart: unless-stopped

  dashboard:
    build:
      context: ../..
      dockerfile: infra/vps/Dockerfile.dashboard
      args:
        VITE_API_BASE: ""
    ports:
      - "127.0.0.1:4101:80"
    restart: unless-stopped

