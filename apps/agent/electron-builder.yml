appId: com.relicwave.grind
productName: Grind
# electron-vite emits main/preload/renderer here; package the built tree only.
directories:
  buildResources: build
  output: release
# pnpm + shamefully-hoist leaves some transitive deps (e.g. color-convert's
# color-name) only at the hoisted root, not beside the package that requires
# them. Without this, electron-builder dedupes them out of the asar and the
# packaged app crashes with "Cannot find module 'color-name'". Including all
# nested node_modules packs the complete, resolvable tree.
includeSubNodeModules: true
files:
  - out/**/*
  - package.json
  # The @grind/* workspace packages are TS source bundled into out/ by
  # electron-vite, so they don't belong in node_modules. Excluding them stops
  # electron-builder from following the pnpm symlinks into the monorepo (and
  # tripping over each package's .turbo cache, which lives outside the app dir).
  - "!**/node_modules/@grind/**"
  - "!**/.turbo/**"
# Native modules must run from disk, not inside the asar archive.
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/sharp/**"
  - "**/node_modules/@img/**"
  - "**/node_modules/uiohook-napi/**"
  - "**/node_modules/get-windows/**"
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Screenshot capture + global input counting need these usage strings so
  # macOS shows a sensible prompt when it requests TCC permission.
  extendInfo:
    NSScreenCaptureUsageDescription: Grind captures periodic screenshots while you are tracking time.
    NSAccessibilityUsageDescription: Grind counts keyboard and mouse activity (never content) while tracking.
  # Notarization runs via notarytool using credentials from the environment:
  #   APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
  # electron-builder picks these up automatically when notarize is enabled.
  notarize: true
dmg:
  title: Grind ${version}
  artifactName: Grind-${version}-${arch}.dmg
