appId: com.relicwave.grind
productName: Timo
# timo:// custom scheme — the system browser redirects here after Lark login.
protocols:
  - name: Timo
    schemes:
      - timo
# electron-vite emits main/preload/renderer here; package the built tree only.
directories:
  buildResources: build
  output: release
publish:
  provider: github
  owner: RelicWave-Technologies
  repo: grind
  channel: latest
# pnpm + shamefully-hoist confuses electron-builder's dependency collector: it
# buries color-convert's `color-name` under color/node_modules and the packaged
# app crashes at launch with "Cannot find module 'color-name'". Two-part fix:
#  - asar: false  → node_modules ships as plain, editable files
#  - afterPack    → hoists the misplaced color-name to the top level post-pack
includeSubNodeModules: true
asar: false
# afterPack is injected as an absolute path by scripts/package-mac.sh — a
# relative path here resolves against CWD (repo root), not the staging dir.
files:
  - out/**/*
  - package.json
  # The @grind/* workspace packages are TS source bundled into out/ by
  # electron-vite, so they don't belong in node_modules. Excluding them stops
  # electron-builder from following the pnpm symlinks into the monorepo (and
  # tripping over each package's .turbo cache, which lives outside the app dir).
  - "!**/node_modules/@grind/**"
  - "!**/.turbo/**"
# Native modules must run from disk, not inside the asar archive.
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/sharp/**"
  - "**/node_modules/@img/**"
  - "**/node_modules/uiohook-napi/**"
  - "**/node_modules/get-windows/**"
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64
        - universal
    - target: zip
      arch:
        - universal
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  # Sharp, uiohook, and get-windows ship per-arch prebuilt native files. In universal macOS
  # builds these runtime files must remain separate instead of being lipo-merged.
  x64ArchFiles: "**/node_modules/{@img,uiohook-napi,get-windows}/**"
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Screenshot capture + global input counting need these usage strings so
  # macOS shows a sensible prompt when it requests TCC permission.
  extendInfo:
    NSScreenCaptureUsageDescription: Timo captures periodic screenshots while you are tracking time.
    NSAccessibilityUsageDescription: Timo counts keyboard and mouse activity (never content) while tracking.
  # Notarization runs via notarytool using credentials from the environment:
  #   APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
  # electron-builder picks these up automatically when notarize is enabled.
  notarize: true
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png
  requestedExecutionLevel: asInvoker
dmg:
  title: Timo ${version}
  artifactName: Timo-${version}-${arch}.dmg
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Timo
  artifactName: Timo-${version}-${arch}-setup.${ext}
