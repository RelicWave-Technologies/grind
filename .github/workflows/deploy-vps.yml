name: Deploy VPS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-vps.yml'
      - 'apps/api/**'
      - 'apps/dashboard/**'
      - 'packages/**'
      - 'infra/vps/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.base.json'

concurrency:
  group: deploy-vps-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  API_IMAGE: ghcr.io/relicwave-technologies/grind-api
  DASHBOARD_IMAGE: ghcr.io/relicwave-technologies/grind-dashboard
  IMAGE_TAG: ${{ github.sha }}
  DOMAIN: timo.emiactech.com
  LETSENCRYPT_EMAIL: admin@emiactech.com

jobs:
  build:
    name: Build and push images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/vps/Dockerfile.api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.API_IMAGE }}:main
          cache-from: type=gha,scope=grind-api
          cache-to: type=gha,mode=max,scope=grind-api

      - name: Build and push dashboard
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/vps/Dockerfile.dashboard
          push: true
          build-args: |
            VITE_API_BASE=
          tags: |
            ${{ env.DASHBOARD_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.DASHBOARD_IMAGE }}:main
          cache-from: type=gha,scope=grind-dashboard
          cache-to: type=gha,mode=max,scope=grind-dashboard

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_PRIVATE_KEY"
          test -n "$PRODUCTION_ENV"
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/grind_vps
          chmod 600 ~/.ssh/grind_vps
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Write deploy files
        run: |
          printf '%s\n' "$PRODUCTION_ENV" > .env.production
          cat > .deploy.env <<EOF
          GRIND_API_IMAGE=${API_IMAGE}
          GRIND_DASHBOARD_IMAGE=${DASHBOARD_IMAGE}
          IMAGE_TAG=${IMAGE_TAG}
          EOF
          chmod 600 .env.production .deploy.env
        env:
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}

      - name: Ensure server checkout
        run: |
          ssh -i ~/.ssh/grind_vps "$VPS_USER@$VPS_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail
          mkdir -p /opt
          if [ -d /opt/grind/.git ]; then
            cd /opt/grind
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
          elif [ -e /opt/grind ]; then
            echo "/opt/grind exists but is not a git checkout" >&2
            exit 1
          else
            git clone https://github.com/RelicWave-Technologies/grind.git /opt/grind
            cd /opt/grind
            git checkout main
          fi
          REMOTE
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}

      - name: Sync production env
        run: |
          ssh -i ~/.ssh/grind_vps "$VPS_USER@$VPS_HOST" 'mkdir -p /opt/grind/infra/vps && chmod 755 /opt/grind /opt/grind/infra /opt/grind/infra/vps'
          scp -i ~/.ssh/grind_vps .env.production "$VPS_USER@$VPS_HOST:/opt/grind/infra/vps/.env.production.tmp"
          scp -i ~/.ssh/grind_vps .deploy.env "$VPS_USER@$VPS_HOST:/opt/grind/infra/vps/.deploy.env.tmp"
          ssh -i ~/.ssh/grind_vps "$VPS_USER@$VPS_HOST" 'mv /opt/grind/infra/vps/.env.production.tmp /opt/grind/infra/vps/.env.production && mv /opt/grind/infra/vps/.deploy.env.tmp /opt/grind/infra/vps/.deploy.env && chmod 600 /opt/grind/infra/vps/.env.production /opt/grind/infra/vps/.deploy.env'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}

      - name: Pull images, backup, migrate, and restart
        run: |
          printf '%s' "$GHCR_TOKEN" > .ghcr-token
          printf '%s' "$GHCR_USER" > .ghcr-user
          chmod 600 .ghcr-token .ghcr-user
          scp -i ~/.ssh/grind_vps .ghcr-token "$VPS_USER@$VPS_HOST:/tmp/grind-ghcr-token"
          scp -i ~/.ssh/grind_vps .ghcr-user "$VPS_USER@$VPS_HOST:/tmp/grind-ghcr-user"
          ssh -i ~/.ssh/grind_vps "$VPS_USER@$VPS_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail

          cd /opt/grind/infra/vps
          GHCR_USER="$(cat /tmp/grind-ghcr-user)"
          docker login ghcr.io -u "$GHCR_USER" --password-stdin < /tmp/grind-ghcr-token
          rm -f /tmp/grind-ghcr-token /tmp/grind-ghcr-user
          set -a
          . ./.deploy.env
          set +a

          migration_started=0
          recover_services_on_failure() {
            if [ "$migration_started" = "0" ]; then
              docker start vps-api-1 vps-dashboard-1 >/dev/null 2>&1 || true
            else
              docker compose --env-file .deploy.env -f docker-compose.prod.yml up -d --remove-orphans >/dev/null 2>&1 || true
            fi
          }
          trap recover_services_on_failure ERR

          docker compose --env-file .deploy.env -f docker-compose.prod.yml pull

          # Freeze writes before the backup/migration boundary. This keeps the
          # backup a true restore point for exactly the data being migrated.
          docker compose --env-file .deploy.env -f docker-compose.prod.yml stop api dashboard || true

          BACKUP_DIR=/opt/grind/backups
          BACKUP_NAME="timetracker_pre_${IMAGE_TAG}_$(date -u +%Y%m%dT%H%M%SZ).dump"
          mkdir -p "$BACKUP_DIR"
          chmod 700 "$BACKUP_DIR"
          docker run --rm \
            --env-file .env.production \
            -v "$BACKUP_DIR:/backups" \
            postgres:16-alpine \
            sh -lc "pg_dump \"\$DATABASE_URL\" -Fc --no-owner --no-privileges -f \"/backups/${BACKUP_NAME}\" && pg_restore --list \"/backups/${BACKUP_NAME}\" >/dev/null"
          sha256sum "$BACKUP_DIR/$BACKUP_NAME"

          migration_started=1
          docker compose --env-file .deploy.env -f docker-compose.prod.yml run --rm -T api pnpm --filter @grind/db exec prisma migrate deploy < /dev/null
          docker run --rm \
            --env-file .env.production \
            -i \
            postgres:16-alpine \
            sh -lc 'psql "$DATABASE_URL" -v ON_ERROR_STOP=1' <<'SQL'
          SELECT migration_name
          FROM "_prisma_migrations"
          WHERE finished_at IS NOT NULL
          ORDER BY finished_at DESC
          LIMIT 4;

          SELECT COUNT(*) AS team_manager_rows
          FROM "TeamManager";

          SELECT COUNT(*) AS non_admin_manager_team_mismatches
          FROM "TeamManager" tm
          JOIN "User" u ON u.id = tm."userId"
          WHERE u.role <> 'ADMIN' AND u."teamId" IS DISTINCT FROM tm."teamId";

          SELECT COUNT(*) AS invalid_workspace_screenshot_defaults
          FROM "WorkspacePolicy"
          WHERE "defaultScreenshotIntervalMin" NOT IN (1, 2, 3);

          SELECT COUNT(*) AS invalid_user_screenshot_overrides
          FROM "User"
          WHERE "screenshotIntervalMin" IS NOT NULL
            AND "screenshotIntervalMin" NOT IN (1, 2, 3);
          SQL

          docker compose --env-file .deploy.env -f docker-compose.prod.yml up -d --remove-orphans
          docker compose --env-file .deploy.env -f docker-compose.prod.yml ps
          docker image prune -f
          trap - ERR
          REMOTE
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}

      - name: Configure Nginx and TLS
        run: |
          ssh -i ~/.ssh/grind_vps "$VPS_USER@$VPS_HOST" 'bash -s' <<REMOTE
          set -euo pipefail

          mkdir -p /var/www/html
          if [ ! -f "/etc/letsencrypt/live/${DOMAIN}/fullchain.pem" ]; then
            cp /opt/grind/infra/vps/nginx-timo.emiactech.com.http.conf /etc/nginx/sites-available/timo.emiactech.com
            ln -sf /etc/nginx/sites-available/timo.emiactech.com /etc/nginx/sites-enabled/timo.emiactech.com
            nginx -t
            systemctl reload nginx
            certbot certonly --webroot -w /var/www/html -d "${DOMAIN}" --non-interactive --agree-tos -m "${LETSENCRYPT_EMAIL}"
          fi

          cp /opt/grind/infra/vps/nginx-timo.emiactech.com.conf /etc/nginx/sites-available/timo.emiactech.com
          ln -sf /etc/nginx/sites-available/timo.emiactech.com /etc/nginx/sites-enabled/timo.emiactech.com
          nginx -t
          systemctl reload nginx
          REMOTE
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}

      - name: Verify public endpoint
        run: |
          curl --fail --show-error --silent "https://${DOMAIN}/healthz"
          curl --fail --show-error --silent --head "https://${DOMAIN}/" >/dev/null
