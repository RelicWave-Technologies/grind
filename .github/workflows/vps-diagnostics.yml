name: VPS Diagnostics

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api-logs:
    name: API logs and Timo status
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - name: Validate required secrets
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_PRIVATE_KEY"
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/grind_vps
          chmod 600 ~/.ssh/grind_vps
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Collect sanitized diagnostics
        run: |
          ssh -i ~/.ssh/grind_vps "$VPS_USER@$VPS_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail

          cd /opt/grind/infra/vps
          echo "== time =="
          date -u

          echo "== compose ps =="
          docker compose --env-file .deploy.env -f docker-compose.prod.yml ps

          echo "== api env status =="
          docker compose --env-file .deploy.env -f docker-compose.prod.yml exec -T api node <<'NODE'
          const show = (key, value) => {
            if (!value) return `${key}=<empty>`;
            if (key.includes('KEY') || key.includes('SECRET') || key.includes('TOKEN')) return `${key}=<set>`;
            if (key === 'TIMO_TESTER_GROUP_CHAT_ID') return `${key}=${value}`;
            return `${key}=${value}`;
          };
          for (const key of [
            'NODE_ENV',
            'WORKSPACE_ID',
            'TIMO_TESTER_BOT_ENABLED',
            'TIMO_TESTER_GROUP_CHAT_ID',
            'TIMO_TESTER_GROUP_TIMEZONE',
            'TIMO_TESTER_PING_TIMES',
            'TIMO_TESTER_HISTORY_POLL_INTERVAL_MS',
            'TIMO_PASSIVE_ISSUE_DETECTION_ENABLED',
            'TIMO_AI_ENABLED',
            'TIMO_AI_PROVIDER',
            'TIMO_AI_MODEL',
            'OPENROUTER_API_KEY',
            'DEEPSEEK_API_KEY',
            'TIMO_CARD_STREAMING_IMAGE_KEY',
          ]) console.log(show(key, process.env[key]));
          NODE

          echo "== tester ops db snapshot =="
          docker compose --env-file .deploy.env -f docker-compose.prod.yml exec -T api node <<'NODE'
          const { PrismaClient } = require('@prisma/client');
          const prisma = new PrismaClient();
          (async () => {
            const cfg = await prisma.testerOpsConfig.findMany({
              select: {
                workspaceId: true,
                enabled: true,
                chatId: true,
                timezone: true,
                pingTimes: true,
                passiveIssueDetectionEnabled: true,
                lastHistoryPollAt: true,
                updatedAt: true,
              },
            });
            const events = await prisma.testerOpsEvent.findMany({
              orderBy: { createdAt: 'desc' },
              take: 8,
              select: {
                source: true,
                sourceId: true,
                chatId: true,
                messageId: true,
                messageText: true,
                status: true,
                error: true,
                receivedAt: true,
                processedAt: true,
                createdAt: true,
              },
            });
            const runs = await prisma.testerOpsAiRun.findMany({
              orderBy: { createdAt: 'desc' },
              take: 5,
              select: { task: true, safeAction: true, confidence: true, error: true, createdAt: true },
            });
            const outbox = await prisma.testerOpsOutboxEvent.findMany({
              orderBy: { createdAt: 'desc' },
              take: 5,
              select: { kind: true, status: true, chatId: true, idempotencyKey: true, attempts: true, lastError: true, createdAt: true, processedAt: true },
            });
            console.log(JSON.stringify({ cfg, events, runs, outbox }, null, 2));
          })().finally(() => prisma.$disconnect());
          NODE

          echo "== recent api logs =="
          docker logs --since 30m --tail 500 vps-api-1 2>&1 \
            | grep -Ei 'tester ops|lark|\\[ws\\]|event|callback|outbox|error|warn|api listening' \
            || true
          REMOTE
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
