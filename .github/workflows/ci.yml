name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: grind_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Used by Prisma generate/validate and the API integration tests.
      DATABASE_URL: 'postgresql://ci:ci@localhost:5432/grind_test'
      DIRECT_URL: 'postgresql://ci:ci@localhost:5432/grind_test'
      TEST_DATABASE_URL: 'postgresql://ci:ci@localhost:5432/grind_test'
      JWT_SECRET: 'ci-only-secret-must-be-at-least-32-chars-long'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.18
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prisma generate + validate
        run: |
          pnpm --filter @grind/db exec prisma generate
          pnpm --filter @grind/db exec prisma validate

      - run: pnpm typecheck

      - run: pnpm lint

      - name: Write .env for tests
        run: |
          cat > .env <<EOF
          DATABASE_URL=$DATABASE_URL
          DIRECT_URL=$DIRECT_URL
          TEST_DATABASE_URL=$TEST_DATABASE_URL
          JWT_SECRET=$JWT_SECRET
          NODE_ENV=test
          EOF

      - name: Tests (unit + API integration against Postgres)
        run: pnpm test
